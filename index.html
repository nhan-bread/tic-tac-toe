<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght,GRAD@17..18,600,-4&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <fieldset>
            <legend>Input player details</legend>
            <label for="namePlayerOne">Player one "X" name: </label>
            <input type="text" id="namePlayerOne" name="namePlayerOne">

            <label for="namePlayerTwo">Player two "O" name: </label>
            <input type="text" id="namePlayerTwo" name="namePlayerTwo">  

            <button class="submit">Submit</button>
        </fieldset>
        <h1 class="turn"></h1>
        <div class="board"></div>
        <div class="scoreboard">
            <p class="player-one"></p>
            <p class="player-two"></p>
        </div>
        <div class="options"></div>
    </div>
</body>
</html>
